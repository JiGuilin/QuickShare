name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_target: "aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_target: "x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
            rust_target: ""
          - platform: ubuntu-22.04
            args: ""
            rust_target: ""

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            core -> target
            server -> target
            cli -> target
            gui/src-tauri -> target

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: gui/package-lock.json

      - name: Install frontend dependencies
        working-directory: gui
        run: npm install

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: cargo tauri
          tagName: ${{ github.ref_name }}
          releaseName: "QuickShare ${{ github.ref_name }}"
          releaseBody: |
            ## QuickShare ${{ github.ref_name }}

            Cross-platform LAN file transfer tool with SHA256 file verification.

            ### ✨ Features
            - Zero-config mDNS device discovery
            - Drag & drop file sending
            - Real-time transfer progress via WebSocket
            - SHA256 file integrity verification
            - Accept/reject incoming transfers
            - Persistent settings across restarts
            - Multi-language support (English / 简体中文)
            - Random device alias (adjective + fruit naming)
            - Auto-start at login

            ### 📥 Downloads
            - **macOS**: `.dmg` installer (Apple Silicon / Intel)
            - **Windows**: `.msi` / `.exe` installer
            - **Linux**: `.deb` / `.AppImage`

            ### 🔧 What's Changed
            - Random device alias generator (like LocalSend)
            - SHA256 file integrity verification
            - Real-time transfer progress via WebSocket
            - Settings persistence across app restarts
            - Folder picker dialog for download directory
            - CLI now waits for receiver acceptance
            - Stable device fingerprint generation
            - Device type detection (Desktop/Mobile)
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
